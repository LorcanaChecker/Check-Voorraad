name: Lorcana Stock Check

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run bot listener
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Run voorraad controle
        run: python check.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
